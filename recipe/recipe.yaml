schema_version: 1

context:
  version: 0.20.0
  name: thrift

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/apache/thrift/archive/refs/tags/v${{ version }}.tar.gz
  sha256: cd7b829d3d9d87f9f7d708e004eef7629789591ee1d416f4741913bc33e5c27d

build:
  number: 2
  script: ${{ PYTHON }} -m pip install lib/py --no-deps -vv

requirements:
  build:
    - if: build_platform != target_platform
      then: python
    - if: build_platform != target_platform
      then: cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
  host:
    - pip
    - python
    - setuptools
    - six
  run:
    - python

tests:
  - python:
      imports:
        - thrift
        - thrift.protocol
        - thrift.server
        - thrift.transport

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Python bindings for the Apache Thrift RPC system
  homepage: http://thrift.apache.org

extra:
  recipe-maintainers:
    - mariusvniekerk
    - marshall245
    - xhochy
