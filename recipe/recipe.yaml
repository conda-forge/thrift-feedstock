schema_version: 1

context:
  version: "0.23.0"
  name: thrift

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/apache/thrift/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 087ba9517063c8252e9e7fb4e3891a9fd85e20af80e0309e2276eff16791d75c

build:
  number: 0
  script: ${{ PYTHON }} -m pip install lib/py --no-deps -vv

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
  host:
    - pip
    - python
    - setuptools
  run:
    - python

tests:
  - python:
      imports:
        - thrift
        - thrift.protocol
        - thrift.server
        - thrift.transport

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Python bindings for the Apache Thrift RPC system
  homepage: http://thrift.apache.org

extra:
  recipe-maintainers:
    - dhirschfeld
    - mariusvniekerk
    - marshall245
    - xhochy
